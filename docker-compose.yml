version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: qa_postgres
    environment:
      POSTGRES_USER: qauser
      POSTGRES_PASSWORD: qapass
      POSTGRES_DB: qa_orchestrator
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U qauser']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qa_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qa_qdrant
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:6333/healthz || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: qa_zap
    command: zap.sh -daemon -host 0.0.0.0 -port 8090 -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true -config api.key=${ZAP_API_KEY:-changeme}
    ports:
      - '8090:8090'
    volumes:
      - zap_data:/zap/wrk

volumes:
  pg_data:
  redis_data:
  qdrant_data:
  zap_data:
